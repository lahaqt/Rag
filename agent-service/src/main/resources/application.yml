server:
  port: 28083

spring:
  application:
    name: rag-agent-service
  ai:
    alibaba:
      a2a:
        server:
          type: jsonrpc
          agent-card-url: /.well-known/agent.json
          message-url: /api/chat/multi-agent/a2a
          version: 0.3.0
          card:
            name: RAG Spring AI Alibaba Agent
            description: Runs ordinary and multi-agent chat through Spring AI Alibaba graph runtimes.
            url: http://127.0.0.1:28083/api/chat/multi-agent/a2a
        nacos:
          registry:
            enabled: false
          discovery:
            enabled: false
  datasource:
    url: ${RAG_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:25432/rag}
    username: ${RAG_POSTGRES_USER:}
    password: ${RAG_POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: localhost
      port: 26380
      password: ${RAG_REDIS_PASSWORD:}

management:
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

rag:
  security:
    identity-signing-secret: ${RAG_IDENTITY_SIGNING_SECRET:}
    service-identity: ${RAG_SERVICE_IDENTITY:agent-service}
    admin-user-ids: ${RAG_ADMIN_USER_IDS:}
    # JSON-RPC A2A is a service-to-service entry point; browser user identities are not accepted.
    a2a-caller-ids: ${RAG_A2A_CALLER_IDS:}
  downstream:
    query-rewrite-base-url: http://127.0.0.1:28082
    query-analysis-timeout-seconds: 8
    storage-base-url: http://127.0.0.1:28081
    storage-retrieval-timeout-seconds: 20
  retrieval:
    top-k: 6
    similarity-threshold: 0.0
    retrieval-mode: hybrid
    query-expansion-enabled: true
    query-expansion-count: 4
    reranker:
      enabled: ${SILICONFLOW_RERANKER_ENABLED:false}
      base-url: https://api.siliconflow.cn/v1
      api-key: ${SILICONFLOW_API_KEY:}
      model: Qwen/Qwen3-Reranker-8B
      candidate-top-k: 20
      instruction: 根据用户问题重排文档，优先选择可直接、准确回答问题的内容。
      timeout-seconds: 8
  prompt:
    context-window-tokens: 200000
    reserved-output-tokens: 2400
    safety-margin-tokens: 8000
    max-attachment-tokens: 32000
    max-history-tokens: 112000
  tools:
    web-search:
      provider: bing
      base-url: https://cn.bing.com
      max-results: 5
  mcp:
    enabled: true
    timeout-seconds: 8
    # Dynamic MCP registration and direct calls are admin-only and disabled by default.
    # If registration is needed, permit only explicitly trusted remote HTTP hosts.
    runtime-registration-enabled: false
    runtime-allowed-http-hosts: ${RAG_MCP_RUNTIME_ALLOWED_HTTP_HOSTS:}
    direct-tool-call-enabled: false
    servers:
      - id: mcp-deepwiki-remote-test
        name: DeepWiki Remote Test
        transport: streamable_http
        endpoint: https://mcp.deepwiki.com/mcp
        enabled: true
        read-only: true
  agent:
    planner-enabled: true
    capability-priority: [web_search, mcp_tool, rag_retrieval]
    tool-timeout-seconds: 8
    read-only-tool-max-attempts: 2
    retry-backoff-millis: 100
    max-execution-seconds: 45
    max-reflection-retries: 2
    global-plan-enabled: true
    plan-llm-fallback-enabled: true
    max-plan-steps: 4
  multi-agent:
    max-concurrency: 4
    timeout-seconds: 12
    failure-isolation-enabled: true
  memory:
    provider: postgres
    enabled: true
    ttl-seconds: 86400
    context-window-tokens: 200000
    compaction-trigger-tokens: 64000
    protected-recent-turns: 6
    oversized-turn-tokens: 16000
    turn-summary-max-tokens: 2000
    summary-max-tokens: 4000
    summary-mode: llm
    semantic-memory-max-items: 4
    profile-enabled: true
    profile-cache-ttl-seconds: 900
    profile-cache-max-entries: 10000
    long-term-extraction-mode: hybrid
    long-term-extraction-max-items: 3
    long-term-extraction-max-tokens: 600
    state-max-entries: 16
    semantic-embedding:
      enabled: true
      provider: siliconflow
      base-url: https://api.siliconflow.cn/v1
      api-key: ${SILICONFLOW_API_KEY:}
      model: Qwen/Qwen3-Embedding-8B
      dimensions: 1024
      similarity-threshold: 0.25
  llm:
    provider: volcengine-ark
    model: ark-code-latest
    api-key: ${ARK_API_KEY:}
    temperature: 0.2
    max-tokens: 2400
    openai-compatible:
      base-url: https://ark.cn-beijing.volces.com/api/plan/v3
    anthropic-compatible:
      base-url: https://ark.cn-beijing.volces.com/api/plan
  cors:
    allowed-origins:
      - http://127.0.0.1:5173
      - http://localhost:5173
