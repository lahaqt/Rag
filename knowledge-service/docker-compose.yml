services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-storage-postgres
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: ${RAG_POSTGRES_USER:?Set RAG_POSTGRES_USER before starting storage}
      POSTGRES_PASSWORD: ${RAG_POSTGRES_PASSWORD:?Set RAG_POSTGRES_PASSWORD before starting storage}
    ports:
      - "127.0.0.1:${RAG_POSTGRES_PORT:-25432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rag-storage-rustfs
    command: ["--address", ":9000", "--console-enable", "--access-key", "${RAG_RUSTFS_ACCESS_KEY:?Set RAG_RUSTFS_ACCESS_KEY before starting storage}", "--secret-key", "${RAG_RUSTFS_SECRET_KEY:?Set RAG_RUSTFS_SECRET_KEY before starting storage}", "/data"]
    environment:
      RUSTFS_ACCESS_KEY: ${RAG_RUSTFS_ACCESS_KEY:?Set RAG_RUSTFS_ACCESS_KEY before starting storage}
      RUSTFS_SECRET_KEY: ${RAG_RUSTFS_SECRET_KEY:?Set RAG_RUSTFS_SECRET_KEY before starting storage}
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "127.0.0.1:${RAG_RUSTFS_PORT:-29100}:9000"
      - "127.0.0.1:${RAG_RUSTFS_CONSOLE_PORT:-29101}:9001"
    volumes:
      - rustfs-data:/data

  redis:
    image: redis:7-alpine
    container_name: rag-storage-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "26380:6379"
    volumes:
      - redis-data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    container_name: rag-storage-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "29200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  rustfs-data:
  redis-data:
  elasticsearch-data:
