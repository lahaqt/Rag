server:
  port: 28081

spring:
  application:
    name: rag-knowledge-service
  datasource:
    url: ${RAG_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:25432/rag}
    username: ${RAG_POSTGRES_USER:}
    password: ${RAG_POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 26380
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

management:
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

rag:
  storage-dir: data/knowledge-bases
  chunk-size: 500
  chunk-overlap: 50
  chunking:
    strategy: recursive
    chunk-size: 500
    chunk-overlap: 50
    min-chunk-size: 120
    separators:
      - "\n\n"
      - "\n"
      - "\u3002"
      - "\uff01"
      - "\uff1f"
      - ";"
      - "\uff1b"
      - "."
      - ","
      - "\uff0c"
      - " "
      - ""
  metadata:
    provider: postgres
  object-storage:
    provider: rustfs
    endpoint: ${RAG_RUSTFS_ENDPOINT:http://127.0.0.1:29100}
    access-key: ${RAG_RUSTFS_ACCESS_KEY:}
    secret-key: ${RAG_RUSTFS_SECRET_KEY:}
    bucket: rag-documents
  queue:
    provider: redis
    stream: document-tasks
    consumer-group: storage-indexers
    consumer-name: knowledge-service-1
  vector:
    embedding:
      provider: siliconflow
      base-url: https://api.siliconflow.cn/v1
      api-key: ${SILICONFLOW_API_KEY:}
      model: Qwen/Qwen3-Embedding-8B
      dimensions: 1024
    store:
      provider: pgvector
      collection: rag_chunks_qwen3_1024
      connection-url: jdbc:postgresql://localhost:25432/rag
  lexical:
    provider: elasticsearch
    endpoint: http://localhost:29200
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    index-name: rag_chunks_lexical
  cors:
    allowed-origins:
      - http://127.0.0.1:5173
      - http://localhost:5173

